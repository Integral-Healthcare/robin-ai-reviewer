name: Tests

on: [pull_request]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bats-core and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Run bats tests
        run: bats tests/
